# Fly.io Konfiguration – Naturheilpraxis Patientenportal
# Deployment: fly deploy

app = "naturheilpraxis-portal"
# Testdomain: portal.seo-smp.de
primary_region = "fra"   # Frankfurt (Deutschland)

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DB_PATH = "/data/portal.db"
  UPLOADS_PATH = "/data/uploads"

# Persistente Speicherung für SQLite-DB und Dokument-Uploads
[mounts]
  source = "portal_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"   # Kostenlos im Free Tier
  memory = "256mb"
