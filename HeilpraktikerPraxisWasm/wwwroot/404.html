<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Heilpraktiker Praxis</title>
    <script>
        // SPA-Routing: Pfad in sessionStorage speichern und zur App-Root weiterleiten
        var l = window.location;
        sessionStorage.setItem('spa_redirect', l.pathname + l.search + l.hash);
        l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/Serranomp/');
    </script>
</head>
<body></body>
</html>
