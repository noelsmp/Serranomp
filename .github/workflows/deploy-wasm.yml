name: Deploy WASM PWA to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'HeilpraktikerPraxisWasm/**'
      - '.github/workflows/deploy-wasm.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish WASM
        run: |
          dotnet publish HeilpraktikerPraxisWasm/HeilpraktikerPraxisWasm.csproj \
            -c Release \
            -o publish \
            --nologo

      - name: Prepare GitHub Pages output
        run: |
          # .nojekyll verhindert Jekyll-Verarbeitung (wichtig für _framework/)
          touch publish/wwwroot/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
